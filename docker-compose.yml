name: armv3

services:
  arm-db:
    image: postgres:18
    container_name: armv3-db
    restart: unless-stopped
    entrypoint:
      - bash
      - -c
      - |
        install -o postgres -g postgres -m 0600 /etc/ssl/arm/tls.key /tmp/pg.key
        install -o postgres -g postgres -m 0644 /etc/ssl/arm/tls.crt /tmp/pg.crt
        exec docker-entrypoint.sh postgres \
          -c ssl=on \
          -c ssl_cert_file=/tmp/pg.crt \
          -c ssl_key_file=/tmp/pg.key \
          -c ssl_ca_file=/etc/ssl/arm/arm-ca.crt
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./db:/var/lib/postgresql
      - ./certs/arm-ca.crt:/etc/ssl/arm/arm-ca.crt:ro
      - ./certs/arm-db.crt:/etc/ssl/arm/tls.crt:ro
      - ./certs/arm-db.key:/etc/ssl/arm/tls.key:ro

  arm-backend:
    build:
      context: .
      dockerfile: services/backend/Dockerfile
    container_name: armv3-backend
    restart: unless-stopped
    depends_on:
      - arm-db
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@arm-db:5432/${POSTGRES_DB}?sslmode=verify-full&sslrootcert=/etc/ssl/arm/arm-ca.crt
      ARM_SERVICE_TOKEN: ${ARM_SERVICE_TOKEN}
      ARM_LOG_LEVEL: ${ARM_LOG_LEVEL:-info}
      OMDB_API_KEY: ${OMDB_API_KEY:-}
      ARM_ALLOWED_ORIGINS: ${ARM_ALLOWED_ORIGINS:-}
      TLS_CERT_PATH: /etc/ssl/arm/tls.crt
      TLS_KEY_PATH: /etc/ssl/arm/tls.key
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      # Phase 7 — transcode dispatcher needs host paths (the docker daemon
      # interprets these, NOT the Backend container's filesystem).
      MEDIA_ROOT: /media
      MAX_PARALLEL_TRANSCODES: ${MAX_PARALLEL_TRANSCODES:-1}
      ARM_TRANSCODE_IMAGE: ${ARM_TRANSCODE_IMAGE:-arm-transcode:dev}
      # Default to the same host paths the bind mounts below resolve to —
      # `${PWD}` is the directory `docker compose` was invoked from, which
      # for this project's docs is always `v3/`. Override in `.env` only if
      # you've moved the data out of the repo tree.
      ARM_HOST_RAW_PATH: ${ARM_HOST_RAW_PATH:-${PWD}/raw}
      ARM_HOST_MEDIA_PATH: ${ARM_HOST_MEDIA_PATH:-${PWD}/media}
      ARM_HOST_LOGS_PATH: ${ARM_HOST_LOGS_PATH:-${PWD}/logs}
      ARM_HOST_CERTS_PATH: ${ARM_HOST_CERTS_PATH:-${PWD}/certs}
      ARM_DOCKER_NETWORK: ${ARM_DOCKER_NETWORK:-armv3_default}
    volumes:
      - ./logs:/logs
      - ./media:/media
      - ./raw:/raw
      - ./certs/arm-ca.crt:/etc/ssl/arm/arm-ca.crt:ro
      - ./certs/arm-backend.crt:/etc/ssl/arm/tls.crt:ro
      - ./certs/arm-backend.key:/etc/ssl/arm/tls.key:ro
      # Phase 7 — Backend spawns arm-transcode-* containers via the socket.
      # Acceptable per docs/arch/06-deployment.md (root-equivalent on host).
      - /var/run/docker.sock:/var/run/docker.sock
    # Uncomment to reach Backend directly from the host for verification curl:
    # ports:
    #   - "8443:8443"

  # Build-only service for the arm-transcode image. Never started — the
  # Backend dispatcher spawns short-lived transcoder containers per task
  # via the docker socket. Build with:
  #   docker compose --profile build-transcode build arm-transcode-builder
  arm-transcode-builder:
    profiles: ["build-transcode"]
    image: ${ARM_TRANSCODE_IMAGE:-arm-transcode:dev}
    build:
      context: .
      dockerfile: services/transcode/Dockerfile
    command: ["/bin/true"]

  arm-ripper-sr0:
    build:
      context: .
      dockerfile: services/ripper/Dockerfile
    container_name: armv3-ripper-sr0
    hostname: arm-ripper-sr0
    restart: unless-stopped
    depends_on:
      - arm-backend
    devices:
      - "/dev/sr0:/dev/sr0"
      # MakeMKV reads the disc through SCSI generic ioctls, not the block
      # device — pass the matching /dev/sg* node too. Find it with:
      #   readlink -f /sys/class/block/sr0/device | xargs -I{} ls {}/scsi_generic/
      # Phase 13 (installer) will auto-detect this; for now it's per-host.
      - "/dev/sg5:/dev/sg5"
    # CAP_SYS_ADMIN is needed for `mount` inside the container so the scan
    # flow can read VIDEO_TS for the pydvdid CRC64 (which feeds the
    # 1337server lookup). The mount is read-only, ephemeral, and unmounted
    # before the scan returns.
    cap_add:
      - SYS_ADMIN
    group_add:
      - "${CDROM_GID:-44}"
    environment:
      ARM_DRIVE_DEV: /dev/sr0
      ARM_BACKEND_URL: https://arm-backend:8443
      ARM_SERVICE_TOKEN: ${ARM_SERVICE_TOKEN}
      ARM_LOG_LEVEL: ${ARM_LOG_LEVEL:-info}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      CDROM_GID: ${CDROM_GID:-44}
    volumes:
      - ./raw:/raw
      - ./logs:/logs
      - ./certs/arm-ca.crt:/etc/ssl/arm/arm-ca.crt:ro
      - ./certs/arm-ripper-sr0.crt:/etc/ssl/arm/tls.crt:ro
      - ./certs/arm-ripper-sr0.key:/etc/ssl/arm/tls.key:ro

  arm-ui:
    build:
      context: .
      dockerfile: services/ui/Dockerfile
    container_name: armv3-ui
    restart: unless-stopped
    depends_on:
      - arm-backend
    ports:
      - "8080:443"
    volumes:
      - ./certs/arm-ca.crt:/etc/ssl/arm/arm-ca.crt:ro
      - ./certs/arm-ui.crt:/etc/ssl/arm/tls.crt:ro
      - ./certs/arm-ui.key:/etc/ssl/arm/tls.key:ro
