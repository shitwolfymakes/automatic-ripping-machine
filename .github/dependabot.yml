# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  # Maintain dependencies for docker
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "daily"
    # Allow up to 10 open pull requests for pip dependencies
    open-pull-requests-limit: 20
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    # Allow up to 10 open pull requests for pip dependencies
    open-pull-requests-limit: 20
  - package-ecosystem: "gitsubmodule"
    directory: "/"
    schedule:
      interval: "daily"
  # Maintain dependencies for pip
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "daily"
    # Allow up to 10 open pull requests for pip dependencies
    open-pull-requests-limit: 20

  # ---------------------------------------------------------------
  # v3 entries (Phase 14). Cutover (Phase 16) removes the v2 entries
  # above and rebases these directories to repo root.
  # Weekly + grouped to keep PR volume sane while v3 is in flux.
  # ---------------------------------------------------------------

  # v3 Python — uv workspace at v3/uv.lock covers all 4 services.
  - package-ecosystem: "uv"
    directory: "/v3"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels: ["v3", "dependencies"]
    groups:
      v3-python:
        patterns: ["*"]

  # v3 UI npm deps.
  - package-ecosystem: "npm"
    directory: "/v3/services/ui"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels: ["v3", "dependencies"]
    groups:
      v3-ui:
        patterns: ["*"]

  # v3 service base images — one entry per Dockerfile dir so
  # dependabot can pin each service independently.
  - package-ecosystem: "docker"
    directory: "/v3/services/backend"
    schedule:
      interval: "weekly"
    labels: ["v3", "dependencies"]
  - package-ecosystem: "docker"
    directory: "/v3/services/ripper"
    schedule:
      interval: "weekly"
    labels: ["v3", "dependencies"]
  - package-ecosystem: "docker"
    directory: "/v3/services/transcode"
    schedule:
      interval: "weekly"
    labels: ["v3", "dependencies"]
  - package-ecosystem: "docker"
    directory: "/v3/services/ui"
    schedule:
      interval: "weekly"
    labels: ["v3", "dependencies"]
