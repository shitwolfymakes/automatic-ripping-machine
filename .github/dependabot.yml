# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  # GitHub Actions used by the workflows under .github/workflows/.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 20

  # Python — uv workspace at /uv.lock covers arm_common + all services.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels: ["dependencies"]
    groups:
      python:
        patterns: ["*"]

  # UI npm deps.
  - package-ecosystem: "npm"
    directory: "/services/ui"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels: ["dependencies"]
    groups:
      ui:
        patterns: ["*"]

  # Service base images — one entry per Dockerfile dir so dependabot
  # can pin each service independently.
  - package-ecosystem: "docker"
    directory: "/services/backend"
    schedule:
      interval: "weekly"
    labels: ["dependencies"]
  - package-ecosystem: "docker"
    directory: "/services/ripper"
    schedule:
      interval: "weekly"
    labels: ["dependencies"]
  - package-ecosystem: "docker"
    directory: "/services/transcode"
    schedule:
      interval: "weekly"
    labels: ["dependencies"]
  - package-ecosystem: "docker"
    directory: "/services/ui"
    schedule:
      interval: "weekly"
    labels: ["dependencies"]
