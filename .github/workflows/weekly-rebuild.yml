# Weekly rebuild — repush the latest stable release against fresh
# base layers so users who `docker compose pull` get CVE-patched bits
# without us hand-cutting a new release every time Debian/Python ships
# a security update.
#
# Trigger: weekly cron (Sundays 03:17 UTC — off-peak, off-hour to dodge
# Docker Hub rate-limit windows). Also `workflow_dispatch` for manual rerun.
#
# Strategy:
#   1. Find the most recent stable `v3.*` tag (excludes pre-releases like -alpha-1).
#   2. Check that tag out.
#   3. Rebuild every service Dockerfile from scratch (no Docker layer cache —
#      that's the whole point: pull fresh base + apt indices).
#   4. Push to the SAME tag (and `:latest`).
#   5. Re-sign + re-attest SBOM. Sigstore accepts multiple sigs per image.
#
# If no stable v3.* tag exists yet, the workflow no-ops cleanly.
name: Weekly rebuild

on:
  schedule:
    - cron: '17 3 * * 0'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Override: rebuild this exact tag instead of latest stable'
        required: false
        default: ''

permissions:
  contents: read
  id-token: write
  packages: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  resolve-tag:
    name: resolve target tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.find.outputs.tag }}
      skip: ${{ steps.find.outputs.skip }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Resolve target tag
        id: find
        env:
          OVERRIDE: ${{ inputs.tag }}
        run: |
          if [[ -n "$OVERRIDE" ]]; then
            tag="$OVERRIDE"
          else
            # Newest stable v3 tag (no pre-release suffix).
            tag="$(git tag --list 'v3.*' --sort=-v:refname | grep -v -- '-' | head -n1 || true)"
          fi
          if [[ -z "$tag" ]]; then
            echo "::warning::No stable v3.* tag found — nothing to rebuild."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
          else
            echo "Resolved target tag: $tag"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
          fi

  rebuild:
    name: rebuild (${{ matrix.service }})
    needs: resolve-tag
    if: needs.resolve-tag.outputs.skip != 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [backend, ripper, transcode, ui]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ needs.resolve-tag.outputs.tag }}

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Verify required repo configuration
        env:
          NS: ${{ secrets.DOCKERHUB_NAMESPACE }}
          USER: ${{ secrets.DOCKERHUB_USERNAME }}
          TOK: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          missing=()
          [[ -z "$NS"   ]] && missing+=("secrets.DOCKERHUB_NAMESPACE")
          [[ -z "$USER" ]] && missing+=("secrets.DOCKERHUB_USERNAME")
          [[ -z "$TOK"  ]] && missing+=("secrets.DOCKERHUB_TOKEN")
          if (( ${#missing[@]} )); then
            printf '::error::Missing repo configuration: %s\n' "${missing[*]}"
            exit 1
          fi

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: docker.io/${{ secrets.DOCKERHUB_NAMESPACE }}/arm-${{ matrix.service }}
          tags: |
            type=raw,value=${{ needs.resolve-tag.outputs.tag }}
            type=raw,value=latest

      # Crucially: NO cache-from. Weekly rebuild's whole job is to ignore
      # the cache and pull fresh base layers + apt indices.
      - name: Build & push (no cache)
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          no-cache: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: false

      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3.9.1
        with:
          cosign-release: 'v2.4.1'

      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: docker.io/${{ secrets.DOCKERHUB_NAMESPACE }}/arm-${{ matrix.service }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: /tmp/sbom-${{ matrix.service }}.spdx.json
          upload-artifact: false

      - name: Sign image (cosign keyless)
        env:
          COSIGN_EXPERIMENTAL: '1'
          IMAGE: docker.io/${{ secrets.DOCKERHUB_NAMESPACE }}/arm-${{ matrix.service }}@${{ steps.build.outputs.digest }}
        run: cosign sign --yes "$IMAGE"

      - name: Attest SBOM (cosign keyless)
        env:
          COSIGN_EXPERIMENTAL: '1'
          IMAGE: docker.io/${{ secrets.DOCKERHUB_NAMESPACE }}/arm-${{ matrix.service }}@${{ steps.build.outputs.digest }}
        run: |
          cosign attest --yes \
            --predicate /tmp/sbom-${{ matrix.service }}.spdx.json \
            --type spdxjson \
            "$IMAGE"
