# CI — lint, test, build, OpenAPI drift detection.
#
# Runs on every pull request and on pushes to main (and wolfy/** dev
# branches). Also fires on changes to this workflow itself, since a PR
# editing it will naturally re-run it.
name: CI

on:
  pull_request:
  push:
    branches: [main, 'wolfy/**']

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_VERSION: '0.11.x'
  PYTHON_VERSION: '3.14'   # must match pyproject.toml requires-python
  NODE_VERSION: '24'
  RUFF_VERSION: '0.15.11'  # must match .pre-commit-config.yaml rev

jobs:
  lint-python:
    name: lint (python — ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          enable-cache: true
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen
      # ruff is managed by pre-commit (not in dev-deps) — match the
      # .pre-commit-config.yaml pin via uvx so local + CI agree.
      - run: uvx --from "ruff==${RUFF_VERSION}" ruff format --check .
      - run: uvx --from "ruff==${RUFF_VERSION}" ruff check .
      - name: mypy
        run: |
          uv run mypy \
            -p arm_common \
            -p arm_backend \
            -p arm_ripper \
            -p arm_transcode

  lint-ui:
    name: lint (ui — eslint + prettier + vue-tsc)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ui
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: services/ui/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck

  lint-shell:
    name: lint (shell — shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends shellcheck
      - name: Run shellcheck on all tracked shell scripts
        run: |
          mapfile -t files < <(git ls-files '*.sh')
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No shell scripts found"
            exit 0
          fi
          shellcheck "${files[@]}"

  test-python:
    name: test (python — pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          enable-cache: true
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen
      # Measure coverage but do not gate yet (no fail_under in pyproject) —
      # the threshold is ratcheted up as the e2e suite fills the gaps.
      - run: uv run coverage run -m pytest -v
      - run: uv run coverage report

  test-ui:
    name: test (ui — vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ui
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: services/ui/package-lock.json
      - run: npm ci
      - run: npm test

  openapi-drift:
    # Live OpenAPI from the FastAPI app must match the committed snapshot
    # consumed by the UI's openapi-typescript codegen. Drift = stale types.
    # Regenerate locally with: bash devtools/regen-openapi-snapshot.sh
    name: openapi snapshot drift
    runs-on: ubuntu-latest
    env:
      ARM_SERVICE_TOKEN: ci-dummy-token
      DATABASE_URL: postgresql+asyncpg://arm:arm@localhost:5432/arm
      ARM_LOG_LEVEL: warning
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          enable-cache: true
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
      - run: uv sync --frozen
      - name: Generate live OpenAPI from FastAPI app
        run: |
          uv run python -c '
          import json
          from arm_backend.main import app
          print(json.dumps(app.openapi()))
          ' > /tmp/openapi.live.json
      - name: Compare against snapshot
        run: |
          jq -S . services/ui/openapi.snapshot.json > /tmp/snapshot.norm.json
          jq -S . /tmp/openapi.live.json           > /tmp/live.norm.json
          if ! diff -u /tmp/snapshot.norm.json /tmp/live.norm.json; then
            echo "::error::OpenAPI snapshot drift — regenerate services/ui/openapi.snapshot.json"
            exit 1
          fi

  build-images:
    # PR-time sanity build: every Dockerfile must build cleanly. No push.
    # Release publishing lives in release.yml.
    name: build (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [backend, ripper, transcode, ui]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: false
          load: false
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
