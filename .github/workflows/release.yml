# v3 release — tagged image build + signed publish.
#
# Trigger: pushing a tag matching `v3.*` (e.g. v3.0.0, v3.0.0-alpha-2).
# Per-service images publish to:
#   docker.io/${{ secrets.DOCKERHUB_NAMESPACE }}/arm-<service>:<tag>
#   docker.io/${{ secrets.DOCKERHUB_NAMESPACE }}/arm-<service>:latest  (only on stable tags)
#
# Each image is:
#   1. Built from v3/services/<service>/Dockerfile (context = v3/).
#   2. Pushed by digest.
#   3. Signed via cosign keyless (Sigstore + GitHub OIDC token, no key material).
#   4. SBOM generated by syft and attested via cosign attest.
#
# Verify post-publish:
#   cosign verify docker.io/<ns>/arm-backend:<tag> \
#     --certificate-identity=https://github.com/<owner>/<repo>/.github/workflows/v3-release.yml@refs/tags/<tag> \
#     --certificate-oidc-issuer=https://token.actions.githubusercontent.com
#
# Required repo configuration (all under secrets, even the namespace —
# could be a `vars.` if not for fork convenience; cutover will revisit):
#   secrets.DOCKERHUB_USERNAME    — Docker Hub login (username, not email)
#   secrets.DOCKERHUB_TOKEN       — Docker Hub access token (Read & Write scope)
#   secrets.DOCKERHUB_NAMESPACE   — Docker Hub namespace, e.g. "shitwolfymakes"
#                                   (cutover commit flips to "automaticrippingmachine")
name: v3 release

on:
  push:
    tags:
      - 'v3.*'

permissions:
  contents: read
  id-token: write     # required for cosign keyless signing (OIDC)
  packages: write     # in case GHCR is added later; harmless on Docker Hub

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false   # never cancel a release mid-publish

jobs:
  publish:
    name: publish (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [backend, ripper, transcode, ui]
    outputs:
      tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Verify required repo configuration
        env:
          NS: ${{ secrets.DOCKERHUB_NAMESPACE }}
          USER: ${{ secrets.DOCKERHUB_USERNAME }}
          TOK: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          missing=()
          [[ -z "$NS"   ]] && missing+=("secrets.DOCKERHUB_NAMESPACE")
          [[ -z "$USER" ]] && missing+=("secrets.DOCKERHUB_USERNAME")
          [[ -z "$TOK"  ]] && missing+=("secrets.DOCKERHUB_TOKEN")
          if (( ${#missing[@]} )); then
            printf '::error::Missing repo configuration: %s\n' "${missing[*]}"
            exit 1
          fi

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        # `latest` tag only for stable releases (no pre-release suffix).
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ secrets.DOCKERHUB_NAMESPACE }}/arm-${{ matrix.service }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: v3
          file: v3/services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: false                          # generated separately via syft below
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - uses: anchore/sbom-action@v0
        id: sbom
        with:
          image: docker.io/${{ secrets.DOCKERHUB_NAMESPACE }}/arm-${{ matrix.service }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: /tmp/sbom-${{ matrix.service }}.spdx.json
          upload-artifact: false

      - name: Sign image (cosign keyless)
        env:
          COSIGN_EXPERIMENTAL: '1'
          IMAGE: docker.io/${{ secrets.DOCKERHUB_NAMESPACE }}/arm-${{ matrix.service }}@${{ steps.build.outputs.digest }}
        run: cosign sign --yes "$IMAGE"

      - name: Attest SBOM (cosign keyless)
        env:
          COSIGN_EXPERIMENTAL: '1'
          IMAGE: docker.io/${{ secrets.DOCKERHUB_NAMESPACE }}/arm-${{ matrix.service }}@${{ steps.build.outputs.digest }}
        run: |
          cosign attest --yes \
            --predicate /tmp/sbom-${{ matrix.service }}.spdx.json \
            --type spdxjson \
            "$IMAGE"
