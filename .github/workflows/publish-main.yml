# Publish main — rolling `:latest` from the trunk.
#
# Mirrors the v2 cadence: every push to `main` republishes `:latest`, and a
# nightly cron rebuilds it from fresh base layers (CVE-patched bits without
# hand-cutting a release). Per-service images publish to:
#   docker.io/${{ secrets.DOCKERHUB_NAMESPACE }}/arm-<service>:latest
#   docker.io/${{ secrets.DOCKERHUB_NAMESPACE }}/arm-<service>:main-<sha>
#
# `:latest` therefore tracks `main` HEAD — bleeding edge, NOT a support target
# (see SECURITY.md: only the newest stable `v3.*` tag is supported). Tagged
# releases are published separately by release.yml under their semver tag, and
# weekly-rebuild.yml keeps the newest stable tag CVE-fresh.
#
# Each image is built, pushed by digest, cosign keyless-signed, and SBOM-
# attested — same supply-chain treatment as release.yml.
name: Publish main

on:
  push:
    branches: [main]
  # Nightly rebuild from fresh base layers (03:41 UTC — off-peak, offset from
  # weekly-rebuild's 03:17 so they don't collide on Sundays).
  schedule:
    - cron: '41 3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write     # required for cosign keyless signing (OIDC)
  packages: write     # in case GHCR is added later; harmless on Docker Hub

concurrency:
  # Newer trunk pushes supersede in-flight ones — `:latest` should reflect the
  # freshest commit. Scheduled and push runs share refs/heads/main here.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: publish (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [backend, ripper, transcode, ui]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Verify required repo configuration
        env:
          NS: ${{ secrets.DOCKERHUB_NAMESPACE }}
          USER: ${{ secrets.DOCKERHUB_USERNAME }}
          TOK: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          missing=()
          [[ -z "$NS"   ]] && missing+=("secrets.DOCKERHUB_NAMESPACE")
          [[ -z "$USER" ]] && missing+=("secrets.DOCKERHUB_USERNAME")
          [[ -z "$TOK"  ]] && missing+=("secrets.DOCKERHUB_TOKEN")
          if (( ${#missing[@]} )); then
            printf '::error::Missing repo configuration: %s\n' "${missing[*]}"
            exit 1
          fi

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: docker.io/${{ secrets.DOCKERHUB_NAMESPACE }}/arm-${{ matrix.service }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=main-,format=short

      # Nightly cron rebuilds without cache to pull fresh base + apt indices;
      # ordinary trunk pushes reuse the gha cache for speed.
      - name: Build & push
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          no-cache: ${{ github.event_name == 'schedule' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: false                          # generated separately via syft below
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3.9.1
        with:
          cosign-release: 'v2.4.1'

      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        id: sbom
        with:
          image: docker.io/${{ secrets.DOCKERHUB_NAMESPACE }}/arm-${{ matrix.service }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: /tmp/sbom-${{ matrix.service }}.spdx.json
          upload-artifact: false

      - name: Sign image (cosign keyless)
        env:
          COSIGN_EXPERIMENTAL: '1'
          IMAGE: docker.io/${{ secrets.DOCKERHUB_NAMESPACE }}/arm-${{ matrix.service }}@${{ steps.build.outputs.digest }}
        run: cosign sign --yes "$IMAGE"

      - name: Attest SBOM (cosign keyless)
        env:
          COSIGN_EXPERIMENTAL: '1'
          IMAGE: docker.io/${{ secrets.DOCKERHUB_NAMESPACE }}/arm-${{ matrix.service }}@${{ steps.build.outputs.digest }}
        run: |
          cosign attest --yes \
            --predicate /tmp/sbom-${{ matrix.service }}.spdx.json \
            --type spdxjson \
            "$IMAGE"
