[tool.uv.workspace]
members = [
    "packages/arm_common",
    "services/backend",
    "services/ripper",
    "services/transcode",
]

[tool.uv.sources]
arm_common = { workspace = true }

[dependency-groups]
dev = [
    "mypy>=1.13",
    "pre-commit>=4.0",
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "respx>=0.21",
    "httpx>=0.27",
    "aiosqlite>=0.20",
]

[tool.ruff]
line-length = 120
target-version = "py314"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["services/backend/tests", "services/ripper/tests", "services/transcode/tests"]

[tool.mypy]
python_version = "3.14"
mypy_path = "packages/arm_common:services/backend:services/ripper:services/transcode"
exclude = [
    "\\.venv/.*",
    "migrations/.*",
    "build/.*",
]
namespace_packages = true
explicit_package_bases = true
strict = true
# Unreachable blocks have been an issue when compiling mypyc, let's try to avoid 'em in the first place.
warn_unreachable = true
implicit_reexport = true
show_error_codes = true
show_column_numbers = true
