server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/ssl/arm/tls.crt;
    ssl_certificate_key /etc/ssl/arm/tls.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Strict CSP — built bundle has no inline scripts and only talks back to the same origin.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; connect-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; frame-ancestors 'none'; base-uri 'self'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass https://arm-backend:8443;
        proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
        proxy_ssl_verify on;
        proxy_ssl_server_name on;
        proxy_set_header Host arm-backend;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Authorization $http_authorization;
    }

    location /ws/ {
        proxy_pass https://arm-backend:8443;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
        proxy_ssl_verify on;
        proxy_ssl_server_name on;
        proxy_set_header Host arm-backend;
        proxy_read_timeout 1d;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
