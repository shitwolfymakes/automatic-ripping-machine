[project]
name = "arm_common"
version = "0.0.0"
description = "Shared schemas, enums, and helpers for ARM v3 services"
requires-python = ">=3.14"
dependencies = [
    "pydantic>=2.7",
    "python-ulid>=2.2",
    "sqlmodel>=0.0.22",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["arm_common"]

[tool.hatch.build.targets.wheel.force-include]
"arm_common/py.typed" = "arm_common/py.typed"
