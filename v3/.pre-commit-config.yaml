# Pre-commit hooks for ARM v3. v2 is frozen, so every hook is scoped to ^v3/.
#
# Install once:  uv run --project v3 pre-commit install --config v3/.pre-commit-config.yaml
# Run manually:  uv run --project v3 pre-commit run --config v3/.pre-commit-config.yaml --all-files
# Bump pins:     uv run --project v3 pre-commit autoupdate --config v3/.pre-commit-config.yaml

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff-format
        files: ^v3/
      - id: ruff
        files: ^v3/
        args: [--fix]

  # mypy runs as a local hook against the uv-synced venv so it sees the real
  # workspace dependencies (fastapi, sqlmodel, pydantic, …) instead of a pinned
  # subset maintained in additional_dependencies.
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run --project v3 mypy
        language: system
        pass_filenames: false
        args:
          - --config-file=v3/pyproject.toml
          - -p
          - arm_common
          - -p
          - arm_backend
          - -p
          - arm_ripper
        files: ^v3/
        types: [python]

      # ESLint + Prettier run as local hooks against the UI's own
      # node_modules (no global install needed). Both run the whole UI
      # tree per-invocation rather than per-file — same pattern as mypy
      # above — because ESLint flat config + Prettier need cwd inside
      # services/ui to discover their configs.
      #
      # First-time setup: `npm install --prefix v3/services/ui` once.
      - id: eslint-ui
        name: eslint (ui)
        entry: bash -c 'cd v3/services/ui && npm run --silent lint:fix'
        language: system
        pass_filenames: false
        files: ^v3/services/ui/.+\.(ts|mts|tsx|vue|js|cjs|mjs)$

      - id: prettier-ui
        name: prettier (ui)
        entry: bash -c 'cd v3/services/ui && npm run --silent format'
        language: system
        pass_filenames: false
        files: ^v3/services/ui/.+\.(ts|mts|tsx|vue|js|cjs|mjs|json|css|md|html)$
